#limited
# ---- 期間限定パック追記方針 ----
# ・アークナイツ公式サイトはJS描画のSPAでWebFetch/curl等では内容を一切取得できないため、
#   更新情報ページを直接参照しない。パック内容はユーザーがスクショで提示する
# ・値段はスクショに記載が無いことが多い。憶測で入力せず、ユーザーに確認すること
# ・isConstant は常に false
# ・既存の(コメントアウトされた)エントリと price+contents が完全一致すればコメントアウトを解除してリネーム
# ・price が同じで contents が近ければ、既存エントリをリネーム&内容を上書き
# ・一致するものが無ければ新規追加（price昇順の位置に挿入）
# ・全作業の終了を告知された場合、今回のスクショ一式(バッチ)に含まれなかった、同じ更新分の既存有効エントリは
#   処理の最後にコメントアウトに戻す（訓練パック等の恒常的な汎用パックは対象外）
# ・龍門幣は1000単位で記入（例:龍門幣×260,000 → 龍門幣1000: 260）
# ・「職業訓練パック」は前衛訓練パック/特殊訓練パックなど類似名でも同一エントリ扱いのため追記不要
# ・本セクション(#limited)はconstant以外を price 昇順に並べる
# --------------------------------

